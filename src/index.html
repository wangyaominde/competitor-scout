<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:" />
  <title>竞品情报</title>
  <link rel="stylesheet" href="styles/app.css" />
  <script>
    // 尽早打平台标记，避免 macOS 标题栏安全区闪一下
    (function () {
      var ua = navigator.userAgent || '';
      var isMac = /Mac|Macintosh/.test(ua);
      var isElectron = /Electron/i.test(ua);
      if (isMac && isElectron) document.documentElement.classList.add('is-darwin');
      else if (isMac) document.documentElement.classList.add('is-darwin');
    })();
  </script>
</head>
<body>
  <div id="boot" class="boot">
    <div class="boot-card">
      <div class="brand-mark lg">竞</div>
      <div class="boot-title">竞品情报</div>
      <div class="boot-sub">正在加载工作区…</div>
      <div class="boot-bar"><i></i></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <!-- macOS 顶栏拖拽区：红绿灯下方不放可点 UI，避免挡住系统窗口菜单 -->
    <div class="titlebar-drag" aria-hidden="true"></div>

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">竞</div>
        <div class="brand-text">
          <strong>竞品情报</strong>
          <span>Competitor Scout</span>
        </div>
      </div>

      <div class="ready-mini" id="ready-mini" title="配置就绪度">
        <div class="ready-mini-top">
          <span>就绪度</span>
          <strong id="ready-mini-pct">0%</strong>
        </div>
        <div class="ready-track"><i id="ready-mini-bar"></i></div>
      </div>

      <nav class="nav" id="nav">
        <button class="nav-item active" data-page="dashboard"><span class="nav-icon">◈</span> 仪表盘</button>
        <button class="nav-item" data-page="competitors"><span class="nav-icon">◎</span> 竞品库</button>
        <button class="nav-item" data-page="scan"><span class="nav-icon">⟳</span> 智能扫描</button>
        <button class="nav-item" data-page="product"><span class="nav-icon">◇</span> 我的产品</button>
        <button class="nav-item" data-page="roadmap"><span class="nav-icon">⇢</span> 击败路径</button>
        <button class="nav-item" data-page="loop"><span class="nav-icon">◷</span> Loop 引擎</button>
        <button class="nav-item" data-page="settings"><span class="nav-icon">⚙</span> 设置</button>
      </nav>

      <div class="sidebar-footer">
        <div class="loop-pill" id="loop-pill">
          <span class="dot"></span>
          <span id="loop-pill-text">Loop 未启动</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">仪表盘</h1>
          <p class="subtitle" id="page-sub">威胁态势与待确认竞品</p>
        </div>
        <div class="topbar-actions">
          <button class="btn ghost" id="btn-notify-toggle" title="通知">
            🔔 <span id="notify-badge" class="badge hidden">0</span>
          </button>
          <button class="btn" id="btn-export" title="导出">导出</button>
          <button class="btn primary" id="btn-quick-scan">立即扫描</button>
        </div>
      </header>

      <div class="content" id="content"></div>
    </main>

    <div id="toasts" class="toasts"></div>

    <div id="notify-drawer" class="drawer hidden">
      <div class="drawer-head">
        <h3>通知</h3>
        <button class="btn icon" id="btn-notify-close">✕</button>
      </div>
      <div class="drawer-body" id="notify-list">
        <p class="muted empty-hint">暂无通知</p>
      </div>
    </div>

    <div id="modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-card" id="modal-card"></div>
    </div>

    <!-- Onboarding -->
    <div id="onboarding" class="onboarding hidden">
      <div class="onboarding-card">
        <div class="onboarding-progress">
          <i id="ob-progress"></i>
        </div>
        <div id="ob-body"></div>
        <div class="onboarding-actions">
          <button class="btn ghost" id="ob-skip">稍后再说</button>
          <div class="row-actions">
            <button class="btn" id="ob-back">上一步</button>
            <button class="btn primary" id="ob-next">继续</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/threat-viz.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
