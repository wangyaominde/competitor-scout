# 自测流水线：密钥检查 + 单元/系统测试
# 触发：push / PR 到 main|master
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure .data is not in tree
        run: |
          if [ -d .data ]; then
            echo "::error::.data directory must not be committed"
            exit 1
          fi
          if git ls-files | grep -E '(^\.data/|competitor-intel-config\.json$|competitor-intel\.json$)' ; then
            echo "::error::Tracked secret/data files found"
            exit 1
          fi
          echo "No secret data paths tracked"

      - name: Install deps (minimal for scripts)
        run: npm ci --ignore-scripts

      - name: Run secrets check
        run: npm run test:secrets

  test:
    name: Self-test (${{ matrix.os }})
    needs: secrets
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # CI 上 Electron 下载偶发慢，给足时间
          ELECTRON_GET_USE_PROXY: 'false'

      - name: Smoke + system tests
        run: npm test
        env:
          CI: 'true'

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: |
            *.log
            .data/startup.log
          if-no-files-found: ignore
