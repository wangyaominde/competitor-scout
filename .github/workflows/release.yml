# 自动编译 macOS / Windows
# - push main  → 测试 + 打包 + 更新 GitHub Pre-release「latest」
# - push tag v* → 测试 + 打包 + 正式 Release
# - 手动触发  → 同上（按当前 ref）
name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pre-build tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          CI: 'true'

  build-mac:
    name: Build macOS
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (dmg + zip)
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 30

  build-win:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (nsis + portable)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download mac artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-build
          path: release-assets

      - name: Download windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: release-assets

      - name: List assets
        run: ls -lah release-assets

      # 正式版：git tag v1.2.3 并 push tag
      - name: Create versioned Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 主干持续构建：直接发布/覆盖正式 Release「latest」
      - name: Publish latest Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: |
            自动构建自 `main`（`${{ github.sha }}`）。

            ## 下载说明
            - **Apple Silicon (M1/M2/M3/M4)**：选 `*-arm64.dmg` 或 `*-arm64-mac.zip`
            - **Intel Mac**：选 `*-x64.dmg` 或 `*-x64-mac.zip`
            - **Windows**：`CompetitorScout-*-win-x64.exe`（安装包 / portable）

            ## macOS 提示「已损坏，无法打开」？
            应用**未做 Apple 公证**（开源免费分发常见）。这不是文件坏了，是系统隔离：

            ```bash
            # 把 App 拖到「应用程序」后执行（路径按实际修改）：
            xattr -cr /Applications/CompetitorScout.app
            open /Applications/CompetitorScout.app
            ```

            或：系统设置 → 隐私与安全性 → 仍要打开。

            ## 其它
            - 每次推送到 main 会覆盖更新本 Release
            - 带版本号发版：`git tag v1.0.0 && git push origin v1.0.0`
            - 安装包英文名：**CompetitorScout**（避免中文包名在部分系统异常）
          files: release-assets/*
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
